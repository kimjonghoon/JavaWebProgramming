<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JavaScript Test</title>
<script>
function check() {
	const form = document.getElementById("signUpForm");
	let id = form.id.value;
	id = removeSpace(id);
	if (id.length == 0) {
		alert("Invalid ID.");
		return false;
	}
	let pass = form.passwd.value;
	pass = removeSpace(pass);
	if (pass.length == 0) {
		alert("Invalid Password.");
		return false;
	}
	let name = form.name.value;
	name = removeSpace(name);
	if (name.length == 0) {
		alert("Invalid Name.");
		return false;
	}
	const email = form.email.value;
	const emailCheck = emailCheck(email);
	if (emailCheck == false) {
		alert("Invalid email.");
		return false;
	}
	const mobile = form.mobile.value;
	const mobileCheck = mobileCheck(mobile);
	if (mobileCheck == false) {
		alert("Invalid mobile number.");
		return false;
	}
	return true;
}

function emailCheck(email) { 
	const re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
	return re.test(email);
}

function removeSpace(str) {
	return str.replace(/(^\s*)|(\s*$)/gi, "");
}

function mobileCheck(mobile) {
	const re = /\d+-\d+-\d+/;
	return re.test(mobile);
}

function testCss() {
	const inputs = document.getElementsByTagName("input");
	for (let i = 0; i < inputs.length; i++) {
		inputs[i].style.background="yellow";
	}
}
</script>
</head>
<body onload="testCss()">
<h1>Sign Up</h1>
<form id="signUpForm" name="signUpForm" action="signUp.php" method="post" onsubmit="return check();">
ID : <input type="text" name="id" value="heist" /><br />
Password : <input type="password" name="passwd" value="1440" /><br />
Name : <input type="text" name="name" value="John Doe" /><br />
Email : <input type="text" name="email" /><br />
Mobile : <input type="text" name="mobile" /><br />
<input type="submit" value="Submit" />
<input type="reset" value="Reset" />
</form>
</body>
</html>
