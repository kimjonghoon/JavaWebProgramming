<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>input values validation test 2</title>
<script>
function check() {
	const form = document.getElementById("signUpForm");
	let id = form.id.value;
	id = removeBeginAndEndSpace(id);
	if (id.length === 0) {
		alert("Invalid ID.");
		return false;
	}
	let passwd = form.passwd.value;
	passwd = removeBeginAndEndSpace(passwd);
	if (passwd.length === 0) {
		alert("Invalid Password.");
		return false;
	}
	let name = form.name.value;
	name = removeBeginAndEndSpace(name);
	if (name.length === 0) {
		alert("Invalid Name.");
		return false;
	}
	const email = form.email.value;
	const isEmail = emailCheck(email);
	if (isEmail === false) {
		alert("Invalid email.");
		return false;
	}
	const mobile = form.mobile.value;
	const isMobile = mobileCheck(mobile);
	if (isMobile === false) {
		alert("Invalid mobile number.");
		return false;
	}
	
	form.id.value = id;
	form.passwd.value = passwd;
	form.name.value = name;
	form.email.value = email;
	form.mobile.value = mobile;
	
	return false;//for test
}

function emailCheck(email) { 
	const re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;
	return re.test(email);
}

function removeBeginAndEndSpace(str) {
	return str.replace(/(^\s*)|(\s*$)/gi, "");
}

function mobileCheck(mobile) {
	const re = /\d+-\d+-\d+/;
	return re.test(mobile);
}
</script>
</head>
<body>
<h1>Sign Up</h1>
<form id="signUpForm" name="signUpForm" method="post" onsubmit="return check();">
ID : <input type="text" name="id" value="   h  e i s  t   " /><br />
Password : <input type="password" name="passwd" value="1111" /><br />
Name: <input type="text" name="name" value="   J  o h n  D   o e   " /><br />
Email : <input type="text" name="email" value="alexa@earch.net" /><br />
Mobile : <input type="text" name="mobile" value="000-1111-1111" /><br />
<input type="submit" value="Submit" />
<input type="reset" value="Reset" />
</form>
</body>
</html>
